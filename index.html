</head>

// SVG PITCH DIAGRAMS

function pitchSVG(type) {
  const W = 300, H = 180;
  const A = (cx,cy) => `<g transform="translate(${cx},${cy})"><circle r="7" fill="#1a2e52"/><text y="4" font-size="8" fill="white" text-anchor="middle" font-weight="bold">A</text></g>`;
  const B = (cx,cy) => `<g transform="translate(${cx},${cy})"><circle r="7" fill="#c8102e"/><text y="4" font-size="8" fill="white" text-anchor="middle" font-weight="bold">B</text></g>`;
  const ball = (cx,cy) => `<circle cx="${cx}" cy="${cy}" r="5" fill="#c9993a"/>`;
  const base = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    <rect width="${W}" height="${H}" rx="4" fill="#4ade80" fill-opacity="0.25"/>
    <rect x="6" y="6" width="${W-12}" height="${H-12}" rx="2" fill="none" stroke="#16a34a" stroke-width="1.5"/>
    <line x1="${W/2}" y1="6" x2="${W/2}" y2="${H-6}" stroke="#16a34a" stroke-width="1" stroke-dasharray="4,3"/>`;

  let c = '';
  if (type === 'possession') {
    c = A(65,45)+A(90,105)+A(55,140)+B(210,55)+B(230,110)+B(195,145)+ball(148,88);
  } else if (type === 'mini_goal') {
    c = `<rect x="8" y="${H/2-15}" width="6" height="30" fill="#f1f5f9" rx="1"/>
         <rect x="${W-14}" y="${H/2-15}" width="6" height="30" fill="#f1f5f9" rx="1"/>`
      +A(85,50)+A(100,115)+A(68,88)+B(195,50)+B(210,115)+B(228,88)+ball(148,88);
  } else if (type === 'full_goal') {
    c = `<rect x="8" y="${H/2-22}" width="8" height="44" fill="#f1f5f9" rx="1"/>
         <rect x="${W-16}" y="${H/2-22}" width="8" height="44" fill="#f1f5f9" rx="1"/>`
      +A(80,45)+A(110,90)+A(80,135)+A(55,88)+B(200,45)+B(210,90)+B(200,135)+B(235,88)+ball(148,88);
  } else if (type === 'corner_goals') {
    c = `<rect x="8" y="10" width="22" height="12" fill="#22c55e" rx="1"/>
         <rect x="${W-30}" y="10" width="22" height="12" fill="#22c55e" rx="1"/>
         <rect x="8" y="${H-22}" width="22" height="12" fill="#22c55e" rx="1"/>
         <rect x="${W-30}" y="${H-22}" width="22" height="12" fill="#22c55e" rx="1"/>`
      +A(95,70)+A(78,118)+A(125,130)+B(188,60)+B(215,112)+B(175,140)+ball(148,88);
  } else if (type === 'wide_channels') {
    c = `<rect x="8" y="8" width="18" height="${H-16}" fill="rgba(14,165,233,0.15)" rx="1"/>
         <rect x="${W-26}" y="8" width="18" height="${H-16}" fill="rgba(14,165,233,0.15)" rx="1"/>
         <rect x="8" y="${H/2-22}" width="8" height="44" fill="#f1f5f9" rx="1"/>
         <rect x="${W-16}" y="${H/2-22}" width="8" height="44" fill="#f1f5f9" rx="1"/>`
      +A(20,50)+A(95,88)+A(20,130)+A(78,88)+B(260,50)+B(188,88)+B(260,130)+B(205,88)+ball(148,88);
  }
  return base + c + '</svg>';
}

function tog(id, cls) {
  document.getElementById(id).classList.toggle('open');
}

function navTo(id) {
  const el = document.getElementById(id);
  if (!el) return;
  // Expand block if collapsed
  if (el.classList.contains('block')) el.classList.add('open');
  // Highlight active nav link
  document.querySelectorAll('.nav a').forEach(a => a.classList.remove('active'));
  const active = document.querySelector(`.nav a[data-target="${id}"]`);
  if (active) active.classList.add('active');
  // Small timeout to let expand repaint, then scroll
  setTimeout(() => {
    const navH = document.querySelector('.nav').offsetHeight;
    const top = el.getBoundingClientRect().top + document.documentElement.scrollTop - navH - 8;
    document.documentElement.scrollTop = top;
  }, 50);
}

function render() {
  const nav = document.getElementById('navLinks');

  // Wire up all nav links (Matches already in HTML with data-target set)
  nav.querySelectorAll('a').forEach(a => {
    const target = a.dataset.target;
    if (target) {
      a.addEventListener('click', (e) => { e.preventDefault(); navTo(target); });
    }
  });

  BLOCKS.forEach(b => {
    const a = document.createElement('a');
    a.href = '#';
    a.dataset.target = `block${b.num}`;
    a.textContent = `B${b.num}`;
    a.addEventListener('click', (e) => { e.preventDefault(); navTo(`block${b.num}`); });
    nav.appendChild(a);
  });
  // Determine current / next block
  const today = new Date();
  today.setHours(0,0,0,0);
  let activeBlock = null, activeBadge = null;
  for (const b of BLOCKS) {
    const s = new Date(b.start), e = new Date(b.end);
    if (today >= s && today <= e) { activeBlock = b; activeBadge = 'NOW'; break; }
  }
  if (!activeBlock) {
    for (const b of BLOCKS) {
      if (new Date(b.start) > today) { activeBlock = b; activeBadge = 'NEXT'; break; }
    }
  }

  let html = renderPhases();
  html += `<div class="section"><div class="section-title">Training Blocks</div></div>`;
  BLOCKS.forEach(b => { html += renderBlock(b, activeBlock && b.num === activeBlock.num ? activeBadge : null); });
  html += renderMatches();
  document.getElementById('app').innerHTML = html;

  // Auto-open and scroll to active block
  if (activeBlock) {
    setTimeout(() => navTo(`block${activeBlock.num}`), 300);
  }
}

render();
</script>
</body>
</html>
